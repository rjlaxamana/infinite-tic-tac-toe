<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>∞ Tic Tac Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F7F7F5;
      --fg:       #111111;
      --mid:      #BBBAB7;
      --glow-col: #E8C547;
      --x-col:    #111111;
      --o-col:    #111111;
      --cell-size: min(26vw, 26vh, 130px);
      --gap:       2px;
      --radius:    6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Wrapper ── */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      user-select: none;
    }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      border: 1.5px solid var(--fg);
      border-radius: 100px;
      overflow: hidden;
    }
    .mode-toggle button {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 7px 20px;
      color: var(--mid);
      transition: color 0.2s, background 0.2s;
    }
    .mode-toggle button.active {
      background: var(--fg);
      color: var(--bg);
    }

    /* ── Board ── */
    .board {
      display: grid;
      grid-template-columns: repeat(3, var(--cell-size));
      grid-template-rows: repeat(3, var(--cell-size));
      gap: var(--gap);
      background: var(--fg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 24px rgba(0,0,0,0.06);
    }

    /* ── Cells ── */
    .cell {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .cell:hover:not(.taken):not(.disabled) {
      background: #EFEEEC;
    }
    .cell.taken { cursor: default; }

    /* ── Mark SVGs ── */
    .mark {
      width: 46%;
      height: 46%;
      transition: opacity 0.2s;
    }

    /* ── Oldest / glow ── */
    .cell.oldest .mark {
      animation: pulse-glow 1.1s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { filter: drop-shadow(0 0 4px var(--glow-col)) drop-shadow(0 0 0px var(--glow-col)); opacity: 1; }
      50%      { filter: drop-shadow(0 0 10px var(--glow-col)) drop-shadow(0 0 20px var(--glow-col)); opacity: 0.75; }
    }

    /* ── Win highlight ── */
    .cell.win-cell .mark {
      filter: drop-shadow(0 0 6px var(--glow-col));
    }
    .cell.win-cell {
      background: #F5F1DA;
    }

    /* ── Moving ghost animation ── */
    .mark.fly-in {
      animation: fly-in 0.28s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fly-in {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Status ── */
    .status {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--mid);
      min-height: 18px;
      text-transform: uppercase;
      text-align: center;
    }
    .status .player {
      color: var(--fg);
      font-weight: 500;
    }

    /* ── Reset ── */
    .reset-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      padding: 4px 0;
      transition: color 0.2s;
    }
    .reset-btn:hover { color: var(--fg); }

    /* ── Disabled overlay during CPU think ── */
    .board.disabled { pointer-events: none; }

    @media (max-height: 500px) {
      :root { --cell-size: min(22vw, 22vh, 100px); }
      #app { gap: 16px; }
    }
  </style>
</head>
<body>
<div id="app">

  <div class="mode-toggle">
    <button id="btn-pvp" class="active" onclick="setMode('pvp')">PvP</button>
    <button id="btn-pvc" onclick="setMode('pvc')">PvC</button>
  </div>

  <div class="board" id="board"></div>

  <div class="status" id="status"></div>

  <button class="reset-btn" onclick="reset()">new game</button>

</div>

<script>
// ── SVG marks ────────────────────────────────────────────────────────────────
const X_SVG = `<svg class="mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <line x1="6" y1="6" x2="34" y2="34" stroke="#111" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="34" y1="6" x2="6" y2="34" stroke="#111" stroke-width="3.2" stroke-linecap="round"/>
</svg>`;

const O_SVG = `<svg class="mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="20" cy="20" r="12" stroke="#111" stroke-width="3.2"/>
</svg>`;

// ── Win combos ───────────────────────────────────────────────────────────────
const WINS = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

// ── State ────────────────────────────────────────────────────────────────────
let mode      = 'pvp';    // 'pvp' | 'pvc'
let board     = Array(9).fill(null);   // null | 'X' | 'O'
let xQueue    = [];   // indices in placement order for X
let oQueue    = [];   // indices in placement order for O
let turn      = 'X';
let winner    = null;
let winCells  = [];
let gameOver  = false;
let pendingMove = null;  // index that will be vacated on next X/O turn (for glow)

// ── Init ─────────────────────────────────────────────────────────────────────
const boardEl  = document.getElementById('board');
const statusEl = document.getElementById('status');

function buildGrid() {
  boardEl.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.i = i;
    cell.addEventListener('click', () => onCellClick(i));
    boardEl.appendChild(cell);
  }
}

function reset() {
  board     = Array(9).fill(null);
  xQueue    = [];
  oQueue    = [];
  turn      = 'X';
  winner    = null;
  winCells  = [];
  gameOver  = false;
  pendingMove = null;
  boardEl.classList.remove('disabled');
  buildGrid();
  render();
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-pvp').classList.toggle('active', m === 'pvp');
  document.getElementById('btn-pvc').classList.toggle('active', m === 'pvc');
  reset();
}

// ── Core logic ───────────────────────────────────────────────────────────────
function queueFor(p) { return p === 'X' ? xQueue : oQueue; }

function oldestIdx(p) {
  const q = queueFor(p);
  return q.length >= 3 ? q[0] : null;
}

function placeAt(idx, animate = false) {
  const q = queueFor(turn);

  // Evict oldest if already at 3 marks
  if (q.length >= 3) {
    const evict = q.shift();
    board[evict] = null;
  }

  board[idx] = turn;
  q.push(idx);

  // Check win
  const w = checkWin(turn);
  if (w) {
    winner   = turn;
    winCells = w;
    gameOver = true;
  } else {
    turn = turn === 'X' ? 'O' : 'X';
  }

  render(animate ? idx : null);

  // CPU move after render
  if (!gameOver && mode === 'pvc' && turn === 'O') {
    boardEl.classList.add('disabled');
    setTimeout(() => {
      cpuMove();
      boardEl.classList.remove('disabled');
    }, 480);
  }
}

function onCellClick(idx) {
  if (gameOver) return;
  if (board[idx] !== null) return;
  if (mode === 'pvc' && turn === 'O') return;
  placeAt(idx, true);
}

function checkWin(p) {
  for (const combo of WINS) {
    if (combo.every(i => board[i] === p)) return combo;
  }
  return null;
}

// ── Computer AI (smart-ish minimax-lite) ─────────────────────────────────────
function cpuMove() {
  const idx = chooseCPU();
  placeAt(idx, true);
}

function getAvailable() {
  // Can't place on a cell occupied by O's oldest mark (it would evict itself — allowed)
  // Can't place on opponent's cells or own non-evict cells… actually can place only on empty
  return board.map((v,i) => v === null ? i : -1).filter(i => i >= 0);
}

function simulatePlace(brd, xQ, oQ, player, idx) {
  const nb   = [...brd];
  const nxQ  = [...xQ];
  const noQ  = [...oQ];
  const q    = player === 'X' ? nxQ : noQ;

  if (q.length >= 3) {
    const evict = q.shift();
    nb[evict] = null;
  }
  nb[idx] = player;
  q.push(idx);

  return { board: nb, xQ: nxQ, oQ: noQ };
}

function simCheckWin(brd, p) {
  for (const combo of WINS) {
    if (combo.every(i => brd[i] === p)) return true;
  }
  return false;
}

function chooseCPU() {
  const avail = getAvailable();

  // 1. Win immediately?
  for (const idx of avail) {
    const s = simulatePlace(board, xQueue, oQueue, 'O', idx);
    if (simCheckWin(s.board, 'O')) return idx;
  }

  // 2. Block X from winning?
  for (const idx of avail) {
    const s = simulatePlace(board, xQueue, oQueue, 'X', idx);
    if (simCheckWin(s.board, 'X')) return idx;
  }

  // 3. One-step lookahead: avoid moves that let X win immediately after
  const safe = avail.filter(idx => {
    const s  = simulatePlace(board, xQueue, oQueue, 'O', idx);
    const xA = s.board.map((v,i) => v===null?i:-1).filter(i=>i>=0);
    for (const xi of xA) {
      const s2 = simulatePlace(s.board, s.xQ, s.oQ, 'X', xi);
      if (simCheckWin(s2.board, 'X')) return false;
    }
    return true;
  });

  const pool = safe.length ? safe : avail;

  // 4. Prefer center > corners > edges
  const priority = [4, 0, 2, 6, 8, 1, 3, 5, 7];
  for (const p of priority) {
    if (pool.includes(p)) return p;
  }
  return pool[0];
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(animIdx = null) {
  // Determine oldest indices for glow
  const xOld = xQueue.length >= 3 ? xQueue[0] : null;
  const oOld = oQueue.length >= 3 ? oQueue[0] : null;

  for (let i = 0; i < 9; i++) {
    const cell = boardEl.children[i];
    const val  = board[i];

    // Classes
    let cls = 'cell';
    if (val !== null)          cls += ' taken';
    if (i === xOld || i === oOld) cls += ' oldest';
    if (winCells.includes(i)) cls += ' win-cell';
    cell.className = cls;

    // Inner mark
    if (val === null) {
      cell.innerHTML = '';
    } else {
      const svgStr = val === 'X' ? X_SVG : O_SVG;
      // Add fly-in only for freshly placed
      const withClass = svgStr.replace('class="mark"', `class="mark${i === animIdx ? ' fly-in' : ''}"`);
      if (cell.innerHTML !== withClass) cell.innerHTML = withClass;
    }
  }

  // Status
  if (gameOver && winner) {
    const label = (mode === 'pvc' && winner === 'O') ? 'computer wins' : `${winner} wins`;
    statusEl.innerHTML = `<span class="player">${label}</span>`;
  } else if (gameOver) {
    statusEl.textContent = 'draw';
  } else {
    const isYourTurn = mode === 'pvp' || turn === 'X';
    const label = mode === 'pvc'
      ? (turn === 'X' ? 'your turn' : 'thinking…')
      : `${turn}'s turn`;
    statusEl.innerHTML = `<span class="player">${label}</span>`;
  }
}

// ── Boot ─────────────────────────────────────────────────────────────────────
buildGrid();
render();
</script>
</body>
</html>
